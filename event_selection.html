<!DOCTYPE html>

<html>
    <head>
        <title> Movie Ticket Booking - Login/Register </title>
        <link href="event_style.css" rel="stylesheet"/>
          <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
          <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
          <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
          <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
          <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@latest/dist/email.min.js"></script>

          <script>
            (function() {
                emailjs.init("iaU90dvQWOBWnu8Kg");
            })();
          </script>
          
    </head>

    <body>
        <div class="booking-container">
            <h2> Book Your Movie Tickets </h2>

            <div class="form-group">
                <label for="movie"> Select Movie: </label>
                <select id="movie">
                    <option value="Avengers"> Avengers </option>
                    <option value="Frozen"> Frozen </option>
                    <option value="Minions"> Minions </option>
                </select>
            </div>

            <div class="form-group">
                <label for="date"> Select The Show Date </label>
                <input type="date" id="date"/>
                <label for="time"> Select Show Time </label>

                <select id="time">
                    <option value="10:00 A.M"> 10:00 A.M </option>
                    <option value="1:00 P.M"> 1:00 P.M </option>
                    <option value="4:00 P.M"> 4:00 P.M </option>
                    <option value="7:00 P.M"> 7:00 P.M </option>
                </select>
            </div>

            <div id="seat-container"></div>

            <button class="btn-book" onclick="showBill()"> Book Now </button>
        </div>

        <div id="overlay"></div>

        <div id="bill-popup">
            <h3> Ticket Summary </h3>
            <p id="bill-details"></p>
            <button class="btn-confirm" onclick="makePayment()"> Proceed To Pay </button>
            <button class="btn-close" onclick="closePopup()">❌ Close </button>
        </div>

        <script src="event_selection.js"></script>
    </body>
</html>
